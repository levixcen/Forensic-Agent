<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIQ | AI Forensics</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@100;400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #1a1d23; color: #B5D4F4; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .navbar { padding: 0.8rem 2rem; border-bottom: 1px solid #378ADD; display: flex; align-items: center; justify-content: space-between; background: #121417; z-index: 10; }
        .logo { font-family: 'Public Sans', sans-serif; font-size: 1.6rem; letter-spacing: 0.02em; color: #FFFFFF; display: flex; align-items: center; }
        .logo .light { font-weight: 100; color: #85B7EB; }
        .logo .bold { font-weight: 400; color: #FFFFFF; margin-left: 1px; }
        .tagline { font-size: 10px; color: #378ADD; letter-spacing: 0.15em; font-weight: 600; }
        .chat-container { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; max-width: 900px; margin: 0 auto; width: 100%; }
        .message { max-width: 85%; padding: 1rem 1.5rem; border-radius: 12px; line-height: 1.6; font-size: 14px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .system-msg { background: #121417; border: 1px solid #378ADD; align-self: flex-start; }
        .user-msg { background: #185FA5; color: #FFFFFF; align-self: flex-end; border: 1px solid #85B7EB; }
        .report-msg { background: #121417; border: 1px solid #FFFFFF; align-self: flex-start; font-family: 'Inter', sans-serif; width: 100%; max-width: 100%; }

        .mitre-table, .timeline-table, .kv-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; font-size: 12px; }
        .mitre-table th, .timeline-table th { background: #185FA5; color: #FFFFFF; padding: 6px 10px; text-align: left; font-size: 10px; letter-spacing: 0.08em; border: 1px solid #378ADD; }
        .mitre-table td, .timeline-table td { padding: 6px 10px; border: 1px solid #1e2530; color: #B5D4F4; vertical-align: middle; }
        .mitre-table tr:nth-child(even) td, .timeline-table tr:nth-child(even) td { background: #0f1115; }
        .mitre-table tr:nth-child(odd) td, .timeline-table tr:nth-child(odd) td { background: #121417; }
        .technique-id { color: #AFA9EC; font-weight: 600; font-family: 'Courier New', monospace; }
        .timestamp-cell { color: #85B7EB; font-family: 'Courier New', monospace; white-space: nowrap; }
        .eventid-cell { color: #AFA9EC; font-weight: 600; font-family: 'Courier New', monospace; text-align: center; }
        .severity-high { color: #FF6B6B; font-weight: 600; }
        .severity-medium { color: #FFB347; font-weight: 600; }
        .severity-low { color: #1D9E75; font-weight: 600; }

        .kv-table td { padding: 5px 10px; border: 1px solid #1e2530; vertical-align: top; }
        .kv-table td:first-child { color: #378ADD; font-weight: 600; width: 200px; background: #0f1115; white-space: nowrap; }
        .kv-table td:last-child { color: #B5D4F4; background: #121417; }

        .download-btn { background: transparent; color: #378ADD; border: 1px solid #378ADD; padding: 6px 14px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; letter-spacing: 0.08em; margin-top: 1rem; display: inline-block; }
        .download-btn:hover { background: #378ADD; color: #121417; }

        .input-area { padding: 1rem 2rem 2.5rem; background: linear-gradient(transparent, #1a1d23 40%); }
        .file-support-legend { max-width: 800px; margin: 0 auto 10px; font-size: 11px; color: #378ADD; display: flex; gap: 15px; justify-content: center; font-weight: 600; }
        .format-tag { border: 1px solid #378ADD; padding: 2px 6px; border-radius: 4px; opacity: 0.8; }
        .input-wrapper { max-width: 800px; margin: 0 auto; background: #121417; border: 1px solid #FFFFFF; border-radius: 24px; padding: 8px 16px; display: flex; align-items: center; gap: 12px; }
        .file-label { color: #85B7EB; cursor: pointer; font-size: 24px; padding: 0 8px; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: #B5D4F4; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; }
        .send-btn { background: #378ADD; color: #121417; border: none; padding: 6px 16px; border-radius: 18px; font-weight: 600; font-size: 13px; cursor: pointer; }
        input[type="file"] { display: none; }
        .step-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #378ADD; margin-bottom: 4px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #378ADD; }
        .done { color: #1D9E75; }
        .done .dot { background: #1D9E75; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><span class="light">Log</span><span class="bold">IQ</span></div>
        <div class="tagline">BLUE TEAM FORENSICS</div>
    </nav>

    <div class="chat-container" id="chatContainer">
        <div class="message system-msg">Session initialized. Upload forensic logs to reconstruct attack sequences.</div>
    </div>

    <div class="input-area">
        <div class="file-support-legend" id="supportLegend">
            <span>Supported:</span>
            <span class="format-tag">.LOG</span>
            <span class="format-tag">.TXT</span>
        </div>
        <div class="input-wrapper">
            <label class="file-label" for="logfile" id="fileIcon">+</label>
            <input type="file" id="logfile">
            <input type="text" id="userInput" placeholder="Upload a file..." readonly>
            <button class="send-btn" id="sendBtn" onclick="handleInteraction()" disabled>Analyze</button>
        </div>
    </div>

    <script>
        const logInput = document.getElementById('logfile');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');
        const fileIcon = document.getElementById('fileIcon');
        const supportLegend = document.getElementById('supportLegend');

        let analysisComplete = false;
        let currentReport = '';

        logInput.addEventListener('change', () => {
            if (logInput.files[0]) {
                userInput.value = logInput.files[0].name;
                sendBtn.disabled = false;
                if (analysisComplete) {
                    analysisComplete = false;
                    currentReport = '';
                    sendBtn.innerText = "Analyze";
                    userInput.readOnly = true;
                }
            }
        });

        function addMessage(content, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function stripMarkdown(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '$1')
                .replace(/\*(.+?)\*/g, '$1')
                .replace(/`(.+?)`/g, '$1')
                .replace(/#+\s/g, '');
        }

        function severityClass(s) {
            if (!s) return '';
            if (s.toLowerCase().includes('high')) return 'severity-high';
            if (s.toLowerCase().includes('medium')) return 'severity-medium';
            return 'severity-low';
        }

        function formatChatResponse(text) {
            if (!text) return '';
            return stripMarkdown(text)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/^\d+\.\s(.+)$/gm, '<div style="display:flex;gap:8px;margin-bottom:4px;"><span style="color:#378ADD;">•</span><span>$1</span></div>')
                .replace(/\n/g, '<br>');
        }

        function buildTimelineTable(lines) {
            let html = '<table class="timeline-table"><thead><tr><th>TIMESTAMP</th><th>EVENT ID</th><th>DESCRIPTION</th></tr></thead><tbody>';
            lines.forEach(line => {
                const clean = line.replace(/^\d+\.\s*/, '').trim();
                if (!clean || !clean.includes('|')) return;
                const cells = clean.split('|').map(c => c.trim()).filter(Boolean);
                if (cells.length >= 2) {
                    const ts = cells[0];
                    const evid = cells[1];
                    const desc = cells[2] || '';
                    html += `<tr>
                        <td class="timestamp-cell">${ts}</td>
                        <td class="eventid-cell">${evid}</td>
                        <td>${desc}</td>
                    </tr>`;
                }
            });
            html += '</tbody></table>';
            return html;
        }

        function buildMitreTable(lines) {
            let html = '<table class="mitre-table"><thead><tr><th>TACTIC</th><th>TECHNIQUE ID</th><th>TECHNIQUE NAME</th><th>SEVERITY</th></tr></thead><tbody>';
            lines.forEach(line => {
                const clean = line.replace(/^\d+\.\s*/, '').trim();
                if (!clean || !clean.includes('|')) return;
                const cells = clean.split('|').map(c => c.trim()).filter(Boolean);
                if (cells.length >= 3) {
                    const sev = cells[3] || cells[cells.length - 1];
                    html += `<tr>
                        <td>${cells[0]}</td>
                        <td class="technique-id">${cells[1]}</td>
                        <td>${cells[2]}</td>
                        <td class="${severityClass(sev)}">${sev}</td>
                    </tr>`;
                }
            });
            html += '</tbody></table>';
            return html;
        }

        function buildKVTable(lines) {
            let html = '<table class="kv-table">';
            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;
                const colon = trimmed.indexOf(':');
                if (colon > 0 && colon < 45) {
                    const key = trimmed.substring(0, colon).trim();
                    const val = trimmed.substring(colon + 1).trim();
                    html += `<tr><td>${key}</td><td>${val}</td></tr>`;
                } else {
                    html += `<tr><td colspan="2" style="color:#B5D4F4;">${trimmed}</td></tr>`;
                }
            });
            html += '</table>';
            return html;
        }

        function formatReport(text) {
            const clean = stripMarkdown(text);
            const kvSections = ['WHAT HAPPENED AND WHEN', 'WHAT WAS THE ROOT CAUSE', 'WHAT WAS AND REMAINS TO BE DONE', 'LESSONS LEARNED'];
            const mitreSections = ['MITRE ATT&CK MAPPING'];
            const timelineSections = ['ATTACK TIMELINE'];
            const allSections = [...kvSections, ...mitreSections, ...timelineSections, 'RECOMMENDED NEXT STEPS', 'ANALYST NOTES'];
            const metaFields = ['CLASSIFICATION', 'REPORT ID', 'DATE', 'ANALYST'];

            let lines = clean.split('\n');
            let html = '<span style="color:#378ADD;font-weight:700;font-size:13px;margin-bottom:1rem;border-bottom:1px solid #185FA5;display:block;padding-bottom:4px;">FORENSIC REPORT</span>';
            html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 24px;margin-bottom:1.2rem;padding-bottom:0.8rem;border-bottom:1px solid #185FA5;font-size:12px;">';

            let metaHtml = '';
            let bodyLines = [];
            let inMeta = true;

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) { if (!inMeta) bodyLines.push(''); return; }
                const isMetaField = metaFields.some(f => trimmed.startsWith(f + ':'));
                if (isMetaField && inMeta) {
                    const colon = trimmed.indexOf(':');
                    const key = trimmed.substring(0, colon).trim();
                    const value = trimmed.substring(colon + 1).trim();
                    metaHtml += `<div><span style="color:#378ADD;font-size:10px;letter-spacing:0.1em;">${key}</span><div style="color:#FFFFFF;margin-top:2px;">${value}</div></div>`;
                } else {
                    inMeta = false;
                    bodyLines.push(trimmed);
                }
            });

            html += metaHtml + '</div>';

            let bodyText = bodyLines.join('\n');
            allSections.forEach(s => {
                bodyText = bodyText.replace(new RegExp(s, 'g'), `|||SECTION|||${s}`);
            });

            const parts = bodyText.split('|||SECTION|||');
            parts.forEach(part => {
                if (!part.trim()) return;
                const matchedSection = allSections.find(s => part.startsWith(s));
                if (matchedSection) {
                    const firstNewline = part.indexOf('\n');
                    const content = firstNewline > -1 ? part.substring(firstNewline).trim() : '';
                    html += `<div style="margin-bottom:1.4rem;">`;
                    html += `<div style="color:#378ADD;font-size:10px;font-weight:700;letter-spacing:0.12em;border-bottom:1px solid #185FA5;padding-bottom:4px;margin-bottom:8px;">${matchedSection}</div>`;

                    if (content) {
                        const contentLines = content.split('\n').filter(l => l.trim());
                        if (timelineSections.includes(matchedSection)) {
                            html += buildTimelineTable(contentLines);
                        } else if (mitreSections.includes(matchedSection)) {
                            html += buildMitreTable(contentLines);
                        } else if (kvSections.includes(matchedSection)) {
                            html += buildKVTable(contentLines);
                        } else {
                            contentLines.forEach(l => {
                                const t = l.trim();
                                if (t.match(/^\d+\./)) {
                                    html += `<div style="display:flex;gap:8px;margin-bottom:4px;"><span style="color:#378ADD;min-width:18px;">${t.match(/^\d+/)[0]}.</span><span style="color:#B5D4F4;">${t.replace(/^\d+\./, '').trim()}</span></div>`;
                                } else {
                                    html += `<p style="color:#B5D4F4;margin-bottom:4px;line-height:1.7;">${t}</p>`;
                                }
                            });
                        }
                    }
                    html += `</div>`;
                } else if (part.trim()) {
                    html += `<p style="color:#B5D4F4;margin-bottom:4px;">${part.trim()}</p>`;
                }
            });

            html += `<button class="download-btn" onclick="downloadReport()">DOWNLOAD REPORT (.DOCX)</button>`;
            return html;
        }

        function downloadReport() {
            fetch('/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ report: currentReport })
            })
            .then(res => res.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'LogIQ_Forensic_Report.docx';
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        async function handleInteraction() {
            const val = userInput.value.trim();
            if (!val) return;
            if (!analysisComplete) {
                runForensicAnalysis();
            } else {
                userInput.value = "";
                addMessage(val, 'user-msg');
                const thinking = addMessage('Analyzing...', 'system-msg');
                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question: val, report_context: currentReport })
                    });
                    const data = await response.json();
                    thinking.remove();
                    if (data.error) { addMessage('Error: ' + data.error, 'system-msg'); }
                    else { addMessage(formatChatResponse(data.response), 'system-msg'); }
                } catch (err) {
                    thinking.remove();
                    addMessage('Something went wrong. Please try again.', 'system-msg');
                }
            }
        }

        async function runForensicAnalysis() {
            sendBtn.disabled = true;
            addMessage(`Source file: <b>${logInput.files[0].name}</b>`, 'user-msg');
            addMessage(`
                <div class="step-item" id="s1"><div class="dot"></div> Normalizing log data...</div>
                <div class="step-item" id="s2"><div class="dot"></div> Heuristic timeline analysis...</div>
                <div class="step-item" id="s3"><div class="dot"></div> Finalizing MITRE mapping...</div>
            `, 'system-msg');

            const formData = new FormData();
            formData.append('logfile', logInput.files[0]);

            await new Promise(r => setTimeout(r, 800));
            document.getElementById('s1').classList.add('done');
            await new Promise(r => setTimeout(r, 800));
            document.getElementById('s2').classList.add('done');

            try {
                const response = await fetch('/analyze', { method: 'POST', body: formData });
                document.getElementById('s3').classList.add('done');
                const data = await response.json();
                if (data.error) { addMessage('Error: ' + data.error, 'system-msg'); sendBtn.disabled = false; return; }
                currentReport = data.report;
                addMessage(formatReport(data.report), 'report-msg');
            } catch (err) {
                addMessage('Something went wrong. Please try again.', 'system-msg');
                sendBtn.disabled = false;
                return;
            }

            analysisComplete = true;
            userInput.placeholder = "Ask about this incident...";
            userInput.readOnly = false;
            userInput.value = "";
            sendBtn.innerText = "Send";
            sendBtn.disabled = false;
            fileIcon.style.opacity = "1";
            fileIcon.style.pointerEvents = "auto";
            supportLegend.style.display = "none";
        }

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleInteraction(); });
    </script>
</body>
</html>
